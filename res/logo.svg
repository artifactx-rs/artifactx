<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ArtifactX logo</title>
  <desc id="desc">ArtifactX wordmark with a geometric package, signed seal, and converging repository lanes.</desc>
  <defs>
    <linearGradient id="ax-cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="ax-lime" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#A3E635"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="40" fill="#FFFFFF"/>

  <g transform="translate(118 72)" filter="url(#soft)">
    <!-- Repository lanes forming an X -->
    <path d="M126 18 L166 18 L86 190 L46 190 Z" fill="#0F172A"/>
    <path d="M208 18 L248 18 L328 190 L288 190 Z" fill="url(#ax-cyan)"/>
    <path d="M46 18 L86 18 L166 190 L126 190 Z" fill="#111827" opacity="0.92"/>
    <path d="M288 18 L328 18 L248 190 L208 190 Z" fill="url(#ax-cyan)"/>

    <!-- Artifact/package cube -->
    <g transform="translate(128 62)">
      <path d="M68 0 L136 34 L68 68 L0 34 Z" fill="#E0F2FE" stroke="#0891B2" stroke-width="6"/>
      <path d="M0 34 L68 68 L68 146 L0 112 Z" fill="#CFFAFE" stroke="#0891B2" stroke-width="6"/>
      <path d="M136 34 L68 68 L68 146 L136 112 Z" fill="#BAE6FD" stroke="#0891B2" stroke-width="6"/>
      <path d="M68 68 L68 146" stroke="#0891B2" stroke-width="6"/>
    </g>

    <!-- Signed metadata seal -->
    <circle cx="268" cy="166" r="38" fill="url(#ax-lime)" stroke="#166534" stroke-width="6"/>
    <path d="M249 166 L263 180 L291 148" stroke="#052E16" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g transform="translate(500 96)">
    <text x="0" y="92" fill="#0F172A" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="98" font-weight="800" letter-spacing="-4">Artifact<tspan fill="#2563EB">X</tspan></text>
    <text x="6" y="146" fill="#64748B" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="25" font-weight="700" letter-spacing="8">IMPORT • SIGN • PUBLISH • STATIC</text>
  </g>
</svg>
