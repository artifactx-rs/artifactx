name: release

on:
  push: { tags: ['v*'] }
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  pages: write
  id-token: write

jobs:
  # --- Build + GitHub Release + GHCR ---
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
      - name: Install musl tools
        run: sudo apt-get update -qq && sudo apt-get install -y -qq musl-tools

      - name: Build static binary (x86_64)
        run: |
          cargo build --release --target x86_64-unknown-linux-musl -p artifactx
          cp target/x86_64-unknown-linux-musl/release/arx arx-amd64
          ls -la arx-amd64

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: arx-amd64
          body: |
            ## ArtifactX ${{ github.ref_name }}
            **Build Once. Package Once. Publish Everywhere.**
            ```bash
            curl -fsSLO https://github.com/artifactx-rs/artifactx/releases/download/${{ github.ref_name }}/arx-amd64
            sudo install -m 755 arx-amd64 /usr/local/bin/arx
            arx init && arx pack ./Cargo.toml && arx publish && arx serve
            ```
            Docker: `docker run --rm -v ./repo:/repo -p 8080:8080 ghcr.io/artifactx-rs/arx:${{ github.ref_name }} serve`
          generate_release_notes: true

      - name: GHCR login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: GHCR Docker image
        run: |
          V="${{ github.ref_name }}"
          mkdir -p /tmp/ghcr
          cp arx-amd64 /tmp/ghcr/arx
          printf 'FROM scratch\nCOPY arx /arx\nENTRYPOINT ["/arx"]\n' > /tmp/ghcr/Dockerfile
          docker build -t ghcr.io/artifactx-rs/arx:$V -t ghcr.io/artifactx-rs/arx:latest /tmp/ghcr
          docker push ghcr.io/artifactx-rs/arx:$V
          docker push ghcr.io/artifactx-rs/arx:latest
          # GHCR default is private — make it public
          gh api /orgs/artifactx-rs/packages/container/arx --method PATCH -f visibility=public 2>/dev/null || echo '(visibility change requires admin token, set manually at https://github.com/orgs/artifactx-rs/packages/container/arx/settings)'

      # Save arx for the pages job
      - uses: actions/upload-artifact@v4
        with:
          name: arx-bin
          path: arx-amd64

  # --- Dogfood: publish arx → GitHub Pages ---
  pages:
    needs: release
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: arx-bin

      - name: Stage arx binary
        run: chmod +x arx-amd64 && mv arx-amd64 arx

      - name: Package arx (.deb + .rpm)
        run: ./arx pack packaging/arx.toml --out dist

      - name: Build signed repo → Pages
        env:
          ARX_KEY_PASSPHRASE: ${{ secrets.ARX_KEY_PASSPHRASE }}
        run: |
          ./arx init public --no-key
          if [ -n "${{ secrets.ARX_SIGNING_KEY }}" ]; then
            printf '%s' "${{ secrets.ARX_SIGNING_KEY }}" > /tmp/key.asc
            ./arx key import /tmp/key.asc --root public
          fi
          ./arx add dist/*.deb dist/*.rpm --root public
          ./arx publish --root public
          cp public/keys/public.asc public/public.asc 2>/dev/null || true
          cat > public/index.html <<'HTML'
          <!doctype html><meta charset=utf-8><title>ArifactX repo</title>
          <h1>Install arx</h1>
          <pre>curl -fsSL REPO_URL/public.asc | sudo tee /etc/apt/keyrings/arx.asc
          echo "deb [signed-by=/etc/apt/keyrings/arx.asc] REPO_URL/apt stable main" | sudo tee /etc/apt/sources.list.d/arx.list
          sudo apt-get update && sudo apt-get install arx</pre>
          HTML

      - uses: actions/upload-pages-artifact@v3
        with: { path: public }
      - id: deployment
        uses: actions/deploy-pages@v4
