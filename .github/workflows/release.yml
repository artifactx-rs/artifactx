name: release

on:
  push: { tags: ['v*'] }
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  pages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Resolve release metadata
        id: meta
        run: |
          CRATE_VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' crates/arx/Cargo.toml | head -n1)"
          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref_name }}"
            VERSION="${TAG#v}"
          else
            TAG="latest"
            VERSION="$CRATE_VERSION"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release metadata: tag=$TAG version=$VERSION"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl,aarch64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2

      - name: Install build deps
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq musl-tools
          wget -qO- https://ziglang.org/download/0.13.0/zig-linux-x86_64-0.13.0.tar.xz | tar xJ
          echo "$PWD/zig-linux-x86_64-0.13.0" >> $GITHUB_PATH
          cargo install cargo-zigbuild

      - name: Build static binaries (amd64 + arm64)
        run: |
          cargo zigbuild --release --target x86_64-unknown-linux-musl -p artifactx
          cargo zigbuild --release --target aarch64-unknown-linux-musl -p artifactx
          TAG="${{ steps.meta.outputs.tag }}"
          cp target/x86_64-unknown-linux-musl/release/arx arx-${TAG}-amd64
          cp target/aarch64-unknown-linux-musl/release/arx arx-${TAG}-arm64
          cp target/x86_64-unknown-linux-musl/release/arx arx-latest-amd64
          cp target/aarch64-unknown-linux-musl/release/arx arx-latest-arm64
          ls -la arx-*

      - name: Self-package — arx packages arx (.deb + .rpm)
        run: |
          TAG="${{ steps.meta.outputs.tag }}"; PKGVER="${{ steps.meta.outputs.version }}"
          chmod +x arx-${TAG}-amd64
          for arch in amd64 arm64; do
            mkdir -p /tmp/pack/$arch
            cp arx-${TAG}-$arch /tmp/pack/$arch/arx
            cat > /tmp/pack/$arch/arx-deb.toml << TOML
          name = "arx"
          version = "$PKGVER"
          arch = "$arch"
          maintainer = "ArtifactX <team@artifactx.rs>"
          description = "Cross-platform package repository manager — one static binary"
          license = "GPL-2.0-or-later"
          section = "utils"
          depends = ["libc6"]
          [[files]]
          source = "/tmp/pack/$arch/arx"
          dest = "/usr/bin/arx"
          mode = "0755"
          TOML
            rpm_arch="x86_64"; [ "$arch" = "arm64" ] && rpm_arch="aarch64"
            cat > /tmp/pack/$arch/arx-rpm.toml << TOML
          name = "arx"
          version = "$PKGVER"
          arch = "$rpm_arch"
          maintainer = "ArtifactX <team@artifactx.rs>"
          description = "Cross-platform package repository manager — one static binary"
          license = "GPL-2.0-or-later"
          [[files]]
          source = "/tmp/pack/$arch/arx"
          dest = "/usr/bin/arx"
          mode = "0755"
          TOML
            ./arx-${TAG}-amd64 pack /tmp/pack/$arch/arx-deb.toml --out dist --deb
            ./arx-${TAG}-amd64 pack /tmp/pack/$arch/arx-rpm.toml --out dist --rpm
          done
          ./arx-${TAG}-amd64 pack /tmp/pack/amd64/arx-deb.toml --out dist --apk || true
          echo "=== self-packaged artifacts ==="
          ls -la dist/

      - name: GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            arx-${{ steps.meta.outputs.tag }}-amd64
            arx-${{ steps.meta.outputs.tag }}-arm64
            arx-latest-amd64
            arx-latest-arm64
            dist/*
          body: |
            ## ArtifactX ${{ github.ref_name }}
            **Build Once. Package Once. Publish Everywhere.**
            ```bash
            curl -fsSLO ${{ github.server_url }}/${{ github.repository }}/releases/latest/download/arx-latest-amd64
            sudo install -m 755 arx-latest-amd64 /usr/local/bin/arx
            arx init && arx pack ./Cargo.toml && arx publish && arx serve
            ```
            Docker: `docker run --rm -v ./repo:/repo -p 8080:8080 ghcr.io/${{ github.repository_owner }}/arx:${{ github.ref_name }} serve`
          generate_release_notes: true

      - name: GHCR login
        if: github.ref_type == 'tag'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: GHCR multi-arch image
        if: github.ref_type == 'tag'
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          for arch in amd64 arm64; do
            mkdir -p /tmp/ghcr/$arch
            cp arx-${TAG}-$arch /tmp/ghcr/$arch/arx
            printf 'FROM scratch\nCOPY arx /arx\nENTRYPOINT ["/arx"]\n' > /tmp/ghcr/$arch/Dockerfile
            docker build -t ghcr.io/artifactx-rs/arx:${TAG}-$arch -f /tmp/ghcr/$arch/Dockerfile /tmp/ghcr/$arch
            docker push ghcr.io/artifactx-rs/arx:${TAG}-$arch
          done
          docker manifest create ghcr.io/artifactx-rs/arx:${TAG} \
            ghcr.io/artifactx-rs/arx:${TAG}-amd64 \
            ghcr.io/artifactx-rs/arx:${TAG}-arm64
          docker manifest create ghcr.io/artifactx-rs/arx:latest \
            ghcr.io/artifactx-rs/arx:${TAG}-amd64 \
            ghcr.io/artifactx-rs/arx:${TAG}-arm64
          docker manifest push ghcr.io/artifactx-rs/arx:${TAG}
          docker manifest push ghcr.io/artifactx-rs/arx:latest

      - uses: actions/upload-artifact@v7
        with: { name: arx-bin, path: arx-latest-amd64 }

  pages:
    needs: release
    if: github.ref_type == 'tag' || github.ref_name == 'main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with: { name: arx-bin }
      - run: |
          chmod +x arx-latest-amd64
          mkdir -p build
          cp arx-latest-amd64 build/arx

      - name: Package arx for dogfood
        env:
          ARX_VERSION: ${{ needs.release.outputs.version }}
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import os

          path = Path('packaging/arx.toml')
          version = os.environ['ARX_VERSION']
          lines = path.read_text().splitlines()
          for i, line in enumerate(lines):
              if line.startswith('version = '):
                  lines[i] = f'version = "{version}"'
                  break
          else:
              raise SystemExit('version field not found in packaging/arx.toml')
          path.write_text('\n'.join(lines) + '\n')
          PY
          ./build/arx pack packaging/arx.toml --out dist

      - name: Build signed repo → Pages
        env:
          ARX_KEY_PASSPHRASE: ${{ secrets.ARX_KEY_PASSPHRASE }}
          ARX_SIGNING_KEY: ${{ secrets.ARX_SIGNING_KEY }}
          PAGES_BASE_URL: ${{ vars.PAGES_BASE_URL }}
          PAGES_REPOSITORY_NAME: ${{ github.event.repository.name }}
        run: |
          if [ -z "${ARX_SIGNING_KEY:-}" ]; then
            echo "ARX_SIGNING_KEY is required for the public Pages repo so clients keep trusting a stable key." >&2
            exit 1
          fi
          ./build/arx init public --no-key
          printf '%s' "$ARX_SIGNING_KEY" > /tmp/key.asc
          ./build/arx key import /tmp/key.asc --root public
          ./build/arx add dist/*.deb dist/*.rpm --root public
          ./build/arx publish --root public
          cp public/keys/public.asc public/public.asc
          rm -f public/keys/private.asc /tmp/key.asc
          test -s public/public.asc
          test ! -e public/keys/private.asc
          OWNER="$GITHUB_REPOSITORY_OWNER"
          REPO="$PAGES_REPOSITORY_NAME"
          if [ -n "$PAGES_BASE_URL" ]; then
            REPO_URL="${PAGES_BASE_URL%/}"
          elif [ "$REPO" = "$OWNER.github.io" ]; then
            REPO_URL="https://${OWNER}.github.io"
          else
            REPO_URL="https://${OWNER}.github.io/${REPO}"
          fi
          cat > public/index.html <<HTML
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>ArtifactX — import apt/yum repos into a signed static repo</title>
            <style>
              :root {
                color-scheme: dark;
                --bg: #090b10;
                --panel: rgba(18, 23, 34, .78);
                --panel-strong: #111827;
                --text: #eef4ff;
                --muted: #99a7bd;
                --line: rgba(148, 163, 184, .24);
                --cyan: #22d3ee;
                --lime: #a3e635;
                --violet: #a78bfa;
                --amber: #fbbf24;
                --shadow: 0 24px 80px rgba(0, 0, 0, .45);
              }
              * { box-sizing: border-box; }
              body {
                margin: 0;
                font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                background:
                  radial-gradient(circle at 20% 10%, rgba(34, 211, 238, .18), transparent 30rem),
                  radial-gradient(circle at 80% 0%, rgba(167, 139, 250, .16), transparent 28rem),
                  radial-gradient(circle at 80% 70%, rgba(163, 230, 53, .10), transparent 30rem),
                  var(--bg);
                color: var(--text);
                min-height: 100vh;
              }
              a { color: inherit; }
              .wrap { width: min(1120px, calc(100% - 32px)); margin: 0 auto; }
              header { padding: 56px 0 28px; }
              .eyebrow {
                display: inline-flex;
                gap: 10px;
                align-items: center;
                padding: 8px 12px;
                border: 1px solid var(--line);
                border-radius: 999px;
                color: var(--cyan);
                background: rgba(8, 13, 24, .72);
                font: 700 12px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
                letter-spacing: .12em;
                text-transform: uppercase;
              }
              h1 {
                margin: 24px 0 14px;
                max-width: 980px;
                font-size: clamp(44px, 8vw, 92px);
                line-height: .92;
                letter-spacing: -.07em;
              }
              .grad { background: linear-gradient(90deg, var(--cyan), var(--lime), var(--amber)); -webkit-background-clip: text; color: transparent; }
              .lead { max-width: 780px; color: var(--muted); font-size: clamp(18px, 2.4vw, 24px); line-height: 1.5; }
              .actions { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 28px; }
              .btn {
                display: inline-flex;
                align-items: center;
                gap: 10px;
                border: 1px solid var(--line);
                border-radius: 14px;
                padding: 13px 16px;
                text-decoration: none;
                background: rgba(255,255,255,.06);
                transition: transform .18s ease, border-color .18s ease, background .18s ease;
              }
              .btn:hover { transform: translateY(-2px); border-color: var(--cyan); background: rgba(34,211,238,.10); }
              .btn.primary { background: linear-gradient(135deg, rgba(34,211,238,.22), rgba(163,230,53,.16)); border-color: rgba(34,211,238,.55); }
              .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; margin: 34px 0; }
              .card {
                border: 1px solid var(--line);
                background: var(--panel);
                box-shadow: var(--shadow);
                border-radius: 22px;
                padding: 20px;
                backdrop-filter: blur(16px);
              }
              .card strong { color: var(--text); }
              .card p { color: var(--muted); line-height: 1.55; margin: 10px 0 0; }
              .tag { color: var(--lime); font: 700 12px/1 ui-monospace, SFMono-Regular, Menlo, monospace; letter-spacing: .1em; text-transform: uppercase; }
              .terminal {
                border: 1px solid rgba(34,211,238,.35);
                border-radius: 22px;
                overflow: hidden;
                background: #05070b;
                box-shadow: var(--shadow), 0 0 80px rgba(34,211,238,.10);
                margin: 26px 0;
              }
              .bar { display: flex; gap: 8px; padding: 12px 14px; border-bottom: 1px solid var(--line); background: #0c111b; }
              .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--cyan); opacity: .8; }
              pre {
                margin: 0;
                overflow-x: auto;
                padding: 20px;
                color: #d7fbe8;
                font: 14px/1.7 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
              }
              section { padding: 22px 0; }
              h2 { font-size: clamp(28px, 4vw, 46px); letter-spacing: -.04em; margin: 0 0 14px; }
              .split { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
              footer { color: var(--muted); border-top: 1px solid var(--line); padding: 30px 0 48px; margin-top: 30px; }
              @media (max-width: 780px) { .split { grid-template-columns: 1fr; } header { padding-top: 34px; } }
            </style>
          </head>
          <body>
            <header class="wrap">
              <span class="eyebrow">Import first. Cut over when ready.</span>
              <h1>Import or create apt/yum repos, then serve a <span class="grad">signed static repo</span>.</h1>
              <p class="lead">Start with packages you already publish, or create a repo from local .deb/.rpm files. Publish signed apt/yum metadata, verify clients, then cut over when the repo is boring.</p>
              <div class="actions">
                <a class="btn primary" href="${REPO_URL}/apt/dists/stable/Release">APT metadata</a>
                <a class="btn" href="${REPO_URL}/yum/myrepo/x86_64/repodata/repomd.xml">YUM metadata</a>
                <a class="btn" href="https://github.com/${{ github.repository }}">GitHub</a>
              </div>
            </header>

            <main class="wrap">
              <section>
                <div class="terminal">
                  <div class="bar"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
                  <pre># GitHub Pages repo currently publishes the amd64 arx package.
          sudo install -d -m 0755 /etc/apt/keyrings
          curl -fsSL ${REPO_URL}/public.asc | sudo tee /etc/apt/keyrings/arx.asc >/dev/null
          echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/arx.asc] ${REPO_URL}/apt stable main" | sudo tee /etc/apt/sources.list.d/arx.list
          sudo apt-get update
          sudo apt-get install arx</pre>
                </div>
              </section>

              <section class="grid">
                <article class="card"><span class="tag">Import</span><p><strong>Migrate existing repos.</strong> Pull from apt Packages metadata or yum repodata, then publish your own signed repo. It is a controlled migration path, not a blind mirror.</p></article>
                <article class="card"><span class="tag">Create</span><p><strong>Start from local packages too.</strong> Run <code>arx init</code>, add .deb/.rpm files, publish, and serve from the same binary.</p></article>
                <article class="card"><span class="tag">Rollback</span><p><strong>Bad release?</strong> Keep published states and return clients to a previous repo snapshot.</p></article>
                <article class="card"><span class="tag">CI</span><p><strong>Push from pipelines.</strong> Upload packages to <code>arx serve</code> with a token or GitHub OIDC.</p></article>
              </section>

              <section class="split">
                <div class="card">
                  <h2>Import an upstream repo</h2>
                  <p>Start with the packages you already publish elsewhere. Filter by name, limit the first migration, verify apt/dnf clients, then regenerate metadata under your own stable signing key.</p>
                  <div class="terminal"><pre>arx init ./repo
          arx import https://packages.example.com --apt --dist stable --component main --match-name myapp --limit 20
          arx publish --root ./repo
          arx serve --root ./repo</pre></div>
                </div>
                <div class="card">
                  <h2>Create and serve a new repo</h2>
                  <p>Use packages you already built, or package from a manifest or Cargo.toml, then publish them into a repo served by <code>arx serve</code>.</p>
                  <div class="terminal"><pre>arx init ./repo
          arx add dist/*.deb dist/*.rpm --root ./repo
          arx publish --root ./repo
          arx serve --root ./repo</pre></div>
                </div>
              </section>
            </main>

            <footer class="wrap">
              <p>ArtifactX: one static binary for importing, packaging, signing, serving, promoting, pruning, and rolling back Linux package repositories.</p>
            </footer>
          </body>
          </html>
          HTML

      - uses: actions/upload-pages-artifact@v3
        with: { path: public }
      - id: deployment
        uses: actions/deploy-pages@v4
