name: release

on:
  push: { tags: ['v*'] }
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  pages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl,aarch64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2

      - name: Install zigbuild
        run: cargo install cargo-zigbuild

      - name: Build static binaries (all arches)
        run: |
          cargo zigbuild --release --target x86_64-unknown-linux-musl -p artifactx
          cargo zigbuild --release --target aarch64-unknown-linux-musl -p artifactx
          cp target/x86_64-unknown-linux-musl/release/arx arx-amd64
          cp target/aarch64-unknown-linux-musl/release/arx arx-arm64
          ls -la arx-*

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: arx-amd64,arx-arm64
          body: |
            ## ArtifactX ${{ github.ref_name }}
            **Build Once. Package Once. Publish Everywhere.**
            ```bash
            # Download + install
            curl -fsSLO https://github.com/artifactx-rs/artifactx/releases/download/${{ github.ref_name }}/arx-amd64
            sudo install -m 755 arx-amd64 /usr/local/bin/arx
            # 5-minute flow
            arx init && arx pack ./Cargo.toml && arx publish && arx serve
            ```
            Docker: `docker run --rm -v ./repo:/repo -p 8080:8080 ghcr.io/artifactx-rs/arx:${{ github.ref_name }} serve`
          generate_release_notes: true

      - name: GHCR login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: GHCR multi-arch image
        run: |
          V="${{ github.ref_name }}"
          for arch in amd64 arm64; do
            mkdir -p /tmp/ghcr/$arch
            cp arx-$arch /tmp/ghcr/$arch/arx
            cat > /tmp/ghcr/$arch/Dockerfile <<DOCKERFILE
          FROM scratch
          COPY arx /arx
          ENTRYPOINT ["/arx"]
          DOCKERFILE
          done
          docker buildx create --use --name arx-builder 2>/dev/null || docker buildx use arx-builder
          docker buildx build --platform linux/amd64,linux/arm64 \
            -t ghcr.io/artifactx-rs/arx:$V \
            -t ghcr.io/artifactx-rs/arx:latest \
            --push /tmp/ghcr

      # --- Dogfood: publish arx → GitHub Pages ---
      - name: Package arx for dogfood
        run: |
          chmod +x arx-amd64
          ./arx-amd64 pack packaging/arx.toml --out dist

      - name: Build signed repo → Pages
        run: |
          ./arx-amd64 init public --no-key
          if [ -n "${{ secrets.ARX_SIGNING_KEY }}" ]; then
            printf '%s' "${{ secrets.ARX_SIGNING_KEY }}" > /tmp/key.asc
            ./arx-amd64 key import /tmp/key.asc --root public
          fi
          ./arx-amd64 add dist/*.deb dist/*.rpm --root public
          ./arx-amd64 publish --root public
          cp public/keys/public.asc public/public.asc 2>/dev/null || true

      - uses: actions/upload-pages-artifact@v3
        with: { path: public }
      - id: deployment
        uses: actions/deploy-pages@v4
