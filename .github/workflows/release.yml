name: release

on:
  push: { tags: ['v*'] }
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to rebuild/publish, for example v0.3.0. Leave empty for a latest Pages rebuild.'
        required: false
        type: string
        default: ''

concurrency:
  group: release-${{ github.repository }}-tags
  cancel-in-progress: true

permissions:
  contents: write
  packages: write
  pages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      run_release: ${{ steps.meta.outputs.run_release }}
      is_tag_release: ${{ steps.meta.outputs.is_tag_release }}
      checkout_ref: ${{ steps.meta.outputs.checkout_ref }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}

      - name: Verify version pins are synchronized
        run: scripts/sync-version.py --check

      - name: Resolve release metadata
        id: meta
        run: |
          RUN_RELEASE=true
          IS_TAG_RELEASE=false
          CHECKOUT_REF="${{ github.ref }}"
          REQUESTED_TAG="${{ inputs.tag }}"
          CRATE_VERSION="$(python3 - <<'PY'
          from pathlib import Path
          import re
          text = Path('crates/arx/Cargo.toml').read_text()
          match = re.search(r'^version\s*=\s*"([^"]+)"', text, re.MULTILINE)
          if not match:
              raise SystemExit('version field not found in crates/arx/Cargo.toml')
          print(match.group(1))
          PY
          )"
          if [ -n "$REQUESTED_TAG" ]; then
            TAG="$REQUESTED_TAG"
            VERSION="${TAG#v}"
            IS_TAG_RELEASE=true
            CHECKOUT_REF="$REQUESTED_TAG"
            if [ "$VERSION" != "$CRATE_VERSION" ]; then
              echo "Requested tag $TAG does not match Cargo version $CRATE_VERSION" >&2
              exit 1
            fi
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref_name }}"
            VERSION="${TAG#v}"
            IS_TAG_RELEASE=true
            CHECKOUT_REF="$TAG"
            if [ "$VERSION" != "$CRATE_VERSION" ]; then
              echo "Tag $TAG does not match Cargo version $CRATE_VERSION" >&2
              exit 1
            fi

            LATEST_TAG="$(git tag --list 'v*' --sort=-v:refname | head -n 1)"
            if [ -n "$LATEST_TAG" ] && [ "$TAG" != "$LATEST_TAG" ]; then
              echo "Skip $TAG because $LATEST_TAG is newer."
              RUN_RELEASE=false
            fi
          else
            TAG="latest"
            VERSION="$CRATE_VERSION"
          fi
          {
            echo "run_release=$RUN_RELEASE"
            echo "is_tag_release=$IS_TAG_RELEASE"
            echo "checkout_ref=$CHECKOUT_REF"
            echo "tag=$TAG"
            echo "version=$VERSION"
          } >> "$GITHUB_OUTPUT"
          echo "Release metadata: tag=$TAG version=$VERSION is_tag_release=$IS_TAG_RELEASE checkout_ref=$CHECKOUT_REF"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl,aarch64-unknown-linux-musl
        if: steps.meta.outputs.run_release == 'true'
      - uses: Swatinem/rust-cache@v2
        if: steps.meta.outputs.run_release == 'true'

      - name: Install build deps
        if: steps.meta.outputs.run_release == 'true'
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq musl-tools
          wget -qO- https://ziglang.org/download/0.13.0/zig-linux-x86_64-0.13.0.tar.xz | tar xJ
          echo "$PWD/zig-linux-x86_64-0.13.0" >> "$GITHUB_PATH"
          cargo install cargo-zigbuild

      - name: Build static binaries (amd64 + arm64)
        if: steps.meta.outputs.run_release == 'true'
        run: |
          cargo zigbuild --release --target x86_64-unknown-linux-musl -p artifactx
          cargo zigbuild --release --target aarch64-unknown-linux-musl -p artifactx
          TAG="${{ steps.meta.outputs.tag }}"
          cp target/x86_64-unknown-linux-musl/release/arx arx-${TAG}-amd64
          cp target/aarch64-unknown-linux-musl/release/arx arx-${TAG}-arm64
          cp target/x86_64-unknown-linux-musl/release/arx arx-latest-amd64
          cp target/aarch64-unknown-linux-musl/release/arx arx-latest-arm64
          ls -la arx-*

      - name: Self-package — arx packages arx (.deb + .rpm + .apk + .pkg.tar.zst)
        if: steps.meta.outputs.run_release == 'true'
        run: |
          TAG="${{ steps.meta.outputs.tag }}"; PKGVER="${{ steps.meta.outputs.version }}"
          chmod +x arx-${TAG}-amd64
          for arch in amd64 arm64; do
            mkdir -p /tmp/pack/$arch
            cp arx-${TAG}-$arch /tmp/pack/$arch/arx
            cp packaging/arx.service /tmp/pack/$arch/arx.service
            cat > /tmp/pack/$arch/arx-deb.toml << TOML
          name = "arx"
          version = "$PKGVER"
          arch = "$arch"
          maintainer = "ArtifactX <team@artifactx.rs>"
          description = "Cross-platform package repository manager — one static binary"
          license = "GPL-2.0-or-later"
          section = "utils"
          depends = ["libc6"]
          [[files]]
          source = "/tmp/pack/$arch/arx"
          dest = "/usr/bin/arx"
          mode = "0755"
          [[files]]
          source = "/tmp/pack/$arch/arx.service"
          dest = "/usr/lib/systemd/system/arx.service"
          mode = "0644"
          TOML
            rpm_arch="x86_64"; [ "$arch" = "arm64" ] && rpm_arch="aarch64"
            cat > /tmp/pack/$arch/arx-rpm.toml << TOML
          name = "arx"
          version = "$PKGVER"
          arch = "$rpm_arch"
          maintainer = "ArtifactX <team@artifactx.rs>"
          description = "Cross-platform package repository manager — one static binary"
          license = "GPL-2.0-or-later"
          [[files]]
          source = "/tmp/pack/$arch/arx"
          dest = "/usr/bin/arx"
          mode = "0755"
          [[files]]
          source = "/tmp/pack/$arch/arx.service"
          dest = "/usr/lib/systemd/system/arx.service"
          mode = "0644"
          TOML
            ./arx-${TAG}-amd64 pack /tmp/pack/$arch/arx-deb.toml --out dist --deb
            ./arx-${TAG}-amd64 pack /tmp/pack/$arch/arx-rpm.toml --out dist --rpm
            ./arx-${TAG}-amd64 pack /tmp/pack/$arch/arx-deb.toml --out dist --apk
            ./arx-${TAG}-amd64 pack /tmp/pack/$arch/arx-deb.toml --out dist --arch-pkg
          done
          echo "=== self-packaged artifacts ==="
          ls -la dist/

      - name: GitHub Release
        if: steps.meta.outputs.is_tag_release == 'true' && steps.meta.outputs.run_release == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          files: |
            arx-${{ steps.meta.outputs.tag }}-amd64
            arx-${{ steps.meta.outputs.tag }}-arm64
            arx-latest-amd64
            arx-latest-arm64
            dist/*
          body: |
            ## ArtifactX ${{ steps.meta.outputs.tag }}
            **Build Once. Package Once. Publish Everywhere.**
            ```bash
            curl -fsSLO ${{ github.server_url }}/${{ github.repository }}/releases/latest/download/arx-latest-amd64
            sudo install -m 755 arx-latest-amd64 /usr/local/bin/arx
            arx init && arx pack ./Cargo.toml && arx publish && arx serve
            ```
            Docker: `docker run --rm -v ./repo:/repo -p 8080:8080 ghcr.io/${{ github.repository_owner }}/arx:${{ steps.meta.outputs.tag }} serve`
          generate_release_notes: true

      - name: GHCR login
        if: steps.meta.outputs.is_tag_release == 'true' && steps.meta.outputs.run_release == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3
        if: steps.meta.outputs.is_tag_release == 'true' && steps.meta.outputs.run_release == 'true'

      - name: GHCR multi-arch image
        if: steps.meta.outputs.is_tag_release == 'true' && steps.meta.outputs.run_release == 'true'
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          for arch in amd64 arm64; do
            platform="linux/amd64"; [ "$arch" = "arm64" ] && platform="linux/arm64"
            mkdir -p /tmp/ghcr/$arch
            cp arx-${TAG}-$arch /tmp/ghcr/$arch/arx
            printf 'FROM scratch\nCOPY arx /arx\nENTRYPOINT ["/arx"]\n' > /tmp/ghcr/$arch/Dockerfile
            docker buildx build \
              --platform "$platform" \
              -t ghcr.io/artifactx-rs/arx:${TAG}-$arch \
              -f /tmp/ghcr/$arch/Dockerfile \
              /tmp/ghcr/$arch \
              --push
          done
          docker buildx imagetools create -t ghcr.io/artifactx-rs/arx:${TAG} \
            ghcr.io/artifactx-rs/arx:${TAG}-amd64 \
            ghcr.io/artifactx-rs/arx:${TAG}-arm64
          docker buildx imagetools create -t ghcr.io/artifactx-rs/arx:latest \
            ghcr.io/artifactx-rs/arx:${TAG}-amd64 \
            ghcr.io/artifactx-rs/arx:${TAG}-arm64
          docker buildx imagetools inspect ghcr.io/artifactx-rs/arx:${TAG}

      - uses: actions/upload-artifact@v7
        if: steps.meta.outputs.run_release == 'true'
        with: { name: arx-bin, path: arx-latest-amd64 }

  pages:
    needs: release
    if: needs.release.outputs.run_release == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.release.outputs.checkout_ref }}
      - uses: actions/download-artifact@v8
        with: { name: arx-bin }
      - run: |
          chmod +x arx-latest-amd64
          mkdir -p build
          cp arx-latest-amd64 build/arx

      - name: Build signed repo → Pages
        env:
          ARX_VERSION: ${{ needs.release.outputs.version }}
          ARX_KEY_PASSPHRASE: ${{ secrets.ARX_KEY_PASSPHRASE }}
          ARX_SIGNING_KEY: ${{ secrets.ARX_SIGNING_KEY }}
          PAGES_BASE_URL: ${{ vars.PAGES_BASE_URL }}
          PAGES_REPOSITORY_NAME: ${{ github.event.repository.name }}
        run: scripts/build-pages-site.sh
      - uses: actions/upload-pages-artifact@v5
        with: { path: public }
      - id: deployment
        uses: actions/deploy-pages@v5
