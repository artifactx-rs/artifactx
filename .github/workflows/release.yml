name: release

on:
  push: { tags: ['v*'] }
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  pages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl,aarch64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2

      - name: Install build deps
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq musl-tools
          wget -qO- https://ziglang.org/download/0.13.0/zig-linux-x86_64-0.13.0.tar.xz | tar xJ
          echo "$PWD/zig-linux-x86_64-0.13.0" >> $GITHUB_PATH
          cargo install cargo-zigbuild

      - name: Build static binaries (amd64 + arm64)
        run: |
          cargo zigbuild --release --target x86_64-unknown-linux-musl -p artifactx
          cargo zigbuild --release --target aarch64-unknown-linux-musl -p artifactx
          cp target/x86_64-unknown-linux-musl/release/arx arx-amd64
          cp target/aarch64-unknown-linux-musl/release/arx arx-arm64
          ls -la arx-*

      - name: Self-package — arx packages arx (.deb + .rpm)
        run: |
          chmod +x arx-amd64
          V="${{ github.ref_name }}"; V="${V#v}"
          [ -z "$V" ] && V="0.1.0"  # fallback for workflow_dispatch
          for arch in amd64 arm64; do
            mkdir -p /tmp/pack/$arch
            cp arx-$arch /tmp/pack/$arch/arx
            # deb manifest
            cat > /tmp/pack/$arch/arx-deb.toml << TOML
          name = "arx"
          version = "$V"
          arch = "$arch"
          maintainer = "ArtifactX <team@artifactx.rs>"
          description = "Cross-platform package repository manager — one static binary"
          license = "GPL-2.0-or-later"
          section = "utils"
          depends = ["libc6"]
          [[files]]
          source = "/tmp/pack/$arch/arx"
          dest = "/usr/bin/arx"
          mode = "0755"
          TOML
            # rpm manifest
            rpm_arch="x86_64"; [ "$arch" = "arm64" ] && rpm_arch="aarch64"
            cat > /tmp/pack/$arch/arx-rpm.toml << TOML
          name = "arx"
          version = "$V"
          arch = "$rpm_arch"
          maintainer = "ArtifactX <team@artifactx.rs>"
          description = "Cross-platform package repository manager — one static binary"
          license = "GPL-2.0-or-later"
          [[files]]
          source = "/tmp/pack/$arch/arx"
          dest = "/usr/bin/arx"
          mode = "0755"
          TOML
            ./arx-amd64 pack /tmp/pack/$arch/arx-deb.toml --out dist --deb
            ./arx-amd64 pack /tmp/pack/$arch/arx-rpm.toml --out dist --rpm
          done
          # Also build native apk
          ./arx-amd64 pack /tmp/pack/amd64/arx-deb.toml --out dist --apk || true
          echo "=== self-packaged artifacts ==="
          ls -la dist/

      - name: GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: arx-*,dist/*
          body: |
            ## ArtifactX ${{ github.ref_name }}
            **Build Once. Package Once. Publish Everywhere.**
            ### Download
            | Arch | Binary | .deb | .rpm |
            |---|---|---|---|
            | amd64 | `arx-amd64` | `arx_*_amd64.deb` | `arx-*.x86_64.rpm` |
            | arm64 | `arx-arm64` | `arx_*_arm64.deb` | `arx-*.aarch64.rpm` |
            ```bash
            curl -fsSLO https://github.com/artifactx-rs/artifactx/releases/download/${{ github.ref_name }}/arx-amd64
            sudo install -m 755 arx-amd64 /usr/local/bin/arx
            ```
            Docker: `docker run --rm -v ./repo:/repo -p 8080:8080 ghcr.io/artifactx-rs/arx:${{ github.ref_name }} serve`
          generate_release_notes: true

      - name: GHCR login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: GHCR multi-arch image
        run: |
          V="${{ github.ref_name }}"
          for arch in amd64 arm64; do
            mkdir -p /tmp/ghcr/$arch
            cp arx-$arch /tmp/ghcr/$arch/arx
            printf 'FROM scratch\nCOPY arx /arx\nENTRYPOINT ["/arx"]\n' > /tmp/ghcr/$arch/Dockerfile
            docker build -t ghcr.io/artifactx-rs/arx:$V-$arch -f /tmp/ghcr/$arch/Dockerfile /tmp/ghcr/$arch
            docker push ghcr.io/artifactx-rs/arx:$V-$arch
          done
          docker manifest create ghcr.io/artifactx-rs/arx:$V \
            ghcr.io/artifactx-rs/arx:$V-amd64 \
            ghcr.io/artifactx-rs/arx:$V-arm64
          docker manifest create ghcr.io/artifactx-rs/arx:latest \
            ghcr.io/artifactx-rs/arx:$V-amd64 \
            ghcr.io/artifactx-rs/arx:$V-arm64
          docker manifest push ghcr.io/artifactx-rs/arx:$V
          docker manifest push ghcr.io/artifactx-rs/arx:latest

      - uses: actions/upload-artifact@v4
        with: { name: arx-bin, path: arx-amd64 }

  pages:
    needs: release
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: arx-bin }
      - run: chmod +x arx-amd64 && mv arx-amd64 arx

      - name: Package arx for dogfood
        run: ./arx pack packaging/arx.toml --out dist

      - name: Build signed repo → Pages
        env:
          ARX_KEY_PASSPHRASE: ${{ secrets.ARX_KEY_PASSPHRASE }}
        run: |
          ./arx init public --no-key
          if [ -n "${{ secrets.ARX_SIGNING_KEY }}" ]; then
            printf '%s' "${{ secrets.ARX_SIGNING_KEY }}" > /tmp/key.asc
            ./arx key import /tmp/key.asc --root public
          fi
          ./arx add dist/*.deb dist/*.rpm --root public
          ./arx publish --root public
          cp public/keys/public.asc public/public.asc 2>/dev/null || true
          cat > public/index.html <<'HTML'
          <!doctype html><meta charset=utf-8><title>ArifactX repo</title>
          <h1>Install arx</h1>
          <pre>curl -fsSL REPO_URL/public.asc | sudo tee /etc/apt/keyrings/arx.asc
          echo "deb [signed-by=/etc/apt/keyrings/arx.asc] REPO_URL/apt stable main" | sudo tee /etc/apt/sources.list.d/arx.list
          sudo apt-get update && sudo apt-get install arx</pre>
          HTML

      - uses: actions/upload-pages-artifact@v3
        with: { path: public }
      - id: deployment
        uses: actions/deploy-pages@v4
