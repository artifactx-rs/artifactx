name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: version sync
        run: scripts/sync-version.py --check
      - name: install real-tool validators (dpkg-deb + rpm)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq dpkg-dev rpm
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: test
        env:
          PACK_REQUIRE_REAL_TOOLS: "1"
        run: cargo test --workspace
      - name: dogfood — arx pack from Cargo.toml
        run: |
          cargo build --release -p artifactx
          ./target/release/arx pack crates/arx/Cargo.toml --deb --out dist
          ls -la dist/
          # Verify dpkg-deb accepts the package built from our own Cargo.toml.
          dpkg-deb --info dist/artifactx_*.deb
