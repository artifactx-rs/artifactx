name: crates.io publish

on:
  push:
    tags: ['v*']
  workflow_dispatch:
  schedule:
    # Retry publishing the current Cargo version weekly in case a tag release
    # succeeded on GitHub/GHCR but crates.io was unavailable or missing a token.
    - cron: '17 3 * * 1'

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable

      - name: Verify version pins are synchronized
        run: scripts/sync-version.py --check

      - name: Resolve Cargo release version
        id: meta
        run: |
          VERSION="$(python3 - <<'PY'
          from pathlib import Path
          import re
          text = Path('crates/arx/Cargo.toml').read_text()
          match = re.search(r'^version\s*=\s*"([^"]+)"', text, re.MULTILINE)
          if not match:
              raise SystemExit('version field not found in crates/arx/Cargo.toml')
          print(match.group(1))
          PY
          )"
          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            if [ "$TAG_VERSION" != "$VERSION" ]; then
              echo "Tag $GITHUB_REF_NAME does not match Cargo version $VERSION" >&2
              exit 1
            fi
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Cargo release version: $VERSION"

      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail

          crate_version() {
            python3 - "$1" <<'PY'
          from pathlib import Path
          import re
          import sys
          text = Path(sys.argv[1]).read_text()
          match = re.search(r'^version\s*=\s*"([^"]+)"', text, re.MULTILINE)
          if not match:
              raise SystemExit(f'version field not found in {sys.argv[1]}')
          print(match.group(1))
          PY
          }

          crate_published() {
            local crate="$1" version="$2"
            cargo search "$crate" --limit 1 | grep -Eq "^${crate} = \"${version}\""
          }

          publish_crate() {
            local crate="$1" manifest="$2" version
            version="$(crate_version "$manifest")"
            if [ "$version" != "$VERSION" ]; then
              echo "$crate version $version does not match release version $VERSION" >&2
              exit 1
            fi
            if crate_published "$crate" "$version"; then
              echo "$crate $version is already on crates.io; skipping"
              return 0
            fi
            if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
              echo "CARGO_REGISTRY_TOKEN is not configured; cannot publish $crate $version." >&2
              exit 1
            fi
            echo "Publishing $crate $version"
            log="/tmp/cargo-publish-${crate}.log"
            if cargo publish --manifest-path "$manifest" --token "$CARGO_REGISTRY_TOKEN" 2>&1 | tee "$log"; then
              return 0
            fi
            if grep -Eiq 'already (uploaded|exists)|crate version .* is already' "$log"; then
              echo "$crate $version was published concurrently; treating as success"
              return 0
            fi
            return 1
          }

          wait_for_crate_version() {
            local crate="$1" version="$2" attempt
            for attempt in $(seq 1 40); do
              if crate_published "$crate" "$version"; then
                echo "$crate $version is visible in the crates.io index"
                return 0
              fi
              echo "Waiting for $crate $version to appear in the crates.io index ($attempt/40)"
              sleep 15
            done
            echo "$crate $version did not become visible in the crates.io index within 10 minutes" >&2
            return 1
          }

          publish_crate arx-debrepo crates/arx-debrepo/Cargo.toml
          wait_for_crate_version arx-debrepo "$VERSION"
          publish_crate arx-pack crates/arx-pack/Cargo.toml
          wait_for_crate_version arx-pack "$VERSION"
          publish_crate artifactx crates/arx/Cargo.toml
