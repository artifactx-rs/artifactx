# ArtifactX — 1-minute quickstart
# docker compose up -d
# curl http://localhost:8080/api/v1/health

services:
  arx:
    image: ghcr.io/artifactx-rs/arx:v0.1.0
    ports:
      - "8080:8080"
    volumes:
      - ./repo:/repo
    command: serve --root /repo --addr 0.0.0.0:8080
    restart: unless-stopped
